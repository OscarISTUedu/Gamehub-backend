version: '3.8'

services:

  db:
    image: postgres:17-alpine
    container_name: gamehub_db
    restart: always
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - django_network_prod

  redis:
    image: redis:7-alpine
    container_name: gamehub_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - django_network_prod

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamehub_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - django_network_prod

volumes:
  postgres_data_prod:

networks:
  django_network_prod:
    driver: bridge
